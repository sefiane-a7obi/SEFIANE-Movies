  <script>
    window.zenithConsoleErrors = [];
    function sendErrorToDevServer(msg) {
      fetch('/log_error?msg=' + encodeURIComponent(msg)).catch(() => {});
    }
    window.onerror = function(message, source, lineno, colno, error) {
      const errText = 'ERR: ' + message + ' in ' + source + ' L:' + lineno + ' C:' + colno + (error ? ' STACK: ' + error.stack : '');
      window.zenithConsoleErrors.push(errText);
      localStorage.setItem('zenith_tv_console_errors', JSON.stringify(window.zenithConsoleErrors));
      sendErrorToDevServer(errText);
    };
    const originalConsoleError = console.error;
    console.error = function(...args) {
      originalConsoleError.apply(console, args);
      const msg = 'CONSOLE_ERR: ' + args.map(a => {
        if (a instanceof Error) {
          return a.message + '\n' + a.stack;
        }
        if (typeof a === 'object' && a !== null) {
          if (a.message) return a.message;
          try {
            return JSON.stringify(a);
          } catch (_) {
            return String(a);
          }
        }
        return String(a);
      }).join(' ');
      window.zenithConsoleErrors.push(msg);
      localStorage.setItem('zenith_tv_console_errors', JSON.stringify(window.zenithConsoleErrors));
      sendErrorToDevServer(msg);
    };
  </script>
